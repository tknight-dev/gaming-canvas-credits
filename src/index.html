<!-- @author tknight-dev -->
<!DOCTYPE html>
<html lang="en">
	<head>
		<link rel="icon" type="image/x-icon" href="./favicon.ico">
		<link rel="preconnect" href="https://fonts.gstatic.com">		
		<link rel="stylesheet" href="./style.css">
		<link rel='stylesheet' href="https://fonts.googleapis.com/css?family=Lato:400,700" type='text/css'>
		<meta charset="utf-8">
		<meta http-equiv="cache-control" content="public"> 
  		<meta name="description" content="gaming-canvas credits example">
  		<meta name="robots" content="none">
		<meta name="viewport" id="viewport-app" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title>Credits</title>
	</head>

	<body id="body">
		<div class="fps" id="fps"></div>
		<div class="video" id="video"></div>
		<div class="controls" id="controls">
			<button autocomplete="off" id="controls-pause" disabled>Pause</button>
			<button autocomplete="off" id="controls-play" disabled>Play</button>
			<button autocomplete="off" id="controls-start">Start</button>
			<button autocomplete="off" id="controls-stop" disabled>Stop</button>
		</div>
		<div class="content" id="content">
			<table>
				<tr>
					<td>Debug:</td>
					<td><input autocomplete="off" type="checkbox" id="settings-debug" checked/></td>
					<td>Show outlines around HTML elements</td>
				</tr>
				<tr>
					<td>Duration:</td>
					<td>
						<input autocomplete="off" type="range" id="settings-duration" value=10000 min=1000 max=60000 step=1000 style="width: calc(100% - 60px)"/>
						<input autocomplete="off" type="text" id="settings-duration-value" value="10s" style="width: 30px" />
					</td>
					<td>How long the credits run for</td>
				</tr>
				<tr>
					<td>Scroll End On Last Element:</td>
					<td><input autocomplete="off" type="checkbox" id="settings-scrollStopOnLastElement" checked/></td>
					<td>The credits should end with the last element centered on the screen</td>
				</tr>
				<tr>
					<td>Scroll Reverse:</td>
					<td><input autocomplete="off" type="checkbox" id="settings-scrollReverse"/></td>
					<td>Display contents and scroll in reverse</td>
				</tr>
			</table>
		</div>
		<script src="./script.mjs" type="module"></script>
	</body>
</html>
